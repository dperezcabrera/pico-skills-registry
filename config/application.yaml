fastapi:
  title: pico-skills-registry
  version: 0.1.0
registry:
  backend: db
  seed_path: ${CATALOG_PATH:example-catalog}
  writer_roles: [admin]
database:
  url: ${DATABASE_URL:sqlite+aiosqlite:////data/registry.db}
server_auth:
  issuer: ${AUTH_ISSUER:http://localhost:8000}
  audience: skills-registry
  auto_create_admin: true
  admin_email: ${ADMIN_EMAIL:admin@registry.local}
  admin_password: ${ADMIN_PASSWORD:change-me}
  admin_role: admin
auth_client:
  enabled: true
  issuer: ${AUTH_ISSUER:http://localhost:8000}
  audience: skills-registry
actuator:
  info:
    app: pico-skills-registry
